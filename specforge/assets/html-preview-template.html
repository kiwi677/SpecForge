<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>需求方案预览</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: #1f2937; background: #f6f7f9; }
    main { max-width: 1080px; margin: 0 auto; padding: 32px 20px 48px; }
    h1 { margin: 0 0 20px; font-size: 28px; }
    section { background: #fff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 20px; margin: 16px 0; }
    h2 { margin: 0 0 12px; font-size: 18px; }
    ul, ol { margin: 8px 0 0 22px; padding: 0; }
    li { margin: 6px 0; line-height: 1.6; }
    p { line-height: 1.7; margin: 8px 0; }
    table { width: 100%; border-collapse: collapse; margin-top: 8px; }
    th, td { border: 1px solid #e5e7eb; padding: 10px; text-align: left; vertical-align: top; }
    th { background: #f9fafb; }
    .tag { display: inline-block; border: 1px solid #d1d5db; border-radius: 999px; padding: 2px 8px; font-size: 12px; background: #f9fafb; }
    .prototype { border: 1px solid #d1d5db; border-radius: 8px; padding: 14px; margin: 12px 0; background: #fbfdff; }
    .prototype-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; align-items: start; }
    @media (max-width: 800px) { .prototype-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main>
    <h1>需求方案预览</h1>
    <!-- 按需展示：需求摘要、问题、方案的主要流程/步骤、原型图片、前端事项、后端事项、运维事项、前期准备事项、风险评估、排期 -->
  </main>
</body>
</html>
